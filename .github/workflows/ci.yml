name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Test
        run: uv run pytest --cov=src/study_python --cov-report=term-missing -x
        env:
          SECRET_KEY: test-secret
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD_HASH: "dummy-hash-for-ci"
          DATABASE_URL: "sqlite:///./test.db"
