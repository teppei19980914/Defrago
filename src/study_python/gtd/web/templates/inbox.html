{% extends "base.html" %}
{% block content %}
<div class="page-container">
    <h2 class="page-title">{{ labels.inbox.title }}</h2>
    <p class="page-desc">{{ labels.inbox.description }}</p>

    <form id="inbox-form" hx-post="/inbox/add" hx-target="#item-list" hx-swap="innerHTML">
        <div class="input-row">
            <input type="text" name="title" id="inbox-title" placeholder="{{ labels.inbox.placeholder }}" class="text-input" autocomplete="off" maxlength="500" required>
            <button type="submit" class="btn-primary">{{ labels.inbox.add_button }}</button>
        </div>
    </form>
    <script>
    (function() {
        var form = document.getElementById('inbox-form');
        var input = document.getElementById('inbox-title');
        form.addEventListener('htmx:afterRequest', function() {
            form.reset();
            input.focus();
        });
    })();
    </script>

    <div id="item-list">
        {% include "partials/item_list.html" %}
    </div>
</div>
{% endblock %}
