{% extends "base.html" %}
{% block content %}
<div class="page-container">
    <h2 class="page-title">収集</h2>
    <p class="page-desc">頭の中にあることをすべて書き出しましょう。分類は後のステップで行います。</p>

    <form id="inbox-form" hx-post="/inbox/add" hx-target="#item-list" hx-swap="innerHTML" class="input-row">
        <input type="text" name="title" placeholder="気になることを入力して Enter..." class="text-input" autocomplete="off" maxlength="500">
        <button type="submit" class="btn-primary">追加</button>
    </form>
    <script>
    document.getElementById('inbox-form').addEventListener('htmx:afterRequest', function(e) {
        this.reset();
        this.querySelector('input').focus();
    });
    </script>

    <div id="item-list">
        {% include "partials/item_list.html" %}
    </div>
</div>
{% endblock %}
