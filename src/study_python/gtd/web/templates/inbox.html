{% extends "base.html" %}
{% block content %}
<div class="page-container">
    <h2 class="page-title">{{ labels.inbox.title }}</h2>
    <p class="page-desc">{{ labels.inbox.description }}</p>

    <form id="inbox-form" hx-post="/inbox/add" hx-target="#item-list" hx-swap="innerHTML" class="input-row">
        <input type="text" name="title" placeholder="{{ labels.inbox.placeholder }}" class="text-input" autocomplete="off" maxlength="500">
        <button type="submit" class="btn-primary">{{ labels.inbox.add_button }}</button>
    </form>
    <script>
    document.getElementById('inbox-form').addEventListener('htmx:afterRequest', function(e) {
        this.reset();
        this.querySelector('input').focus();
    });
    </script>

    <div id="item-list">
        {% include "partials/item_list.html" %}
    </div>
</div>
{% endblock %}
