{% if current %}
<p class="muted-text">{{ items|length }} 件の未分類アイテム</p>
<div class="item-display">{{ current.title }}</div>

{% if show_context_form %}
<p class="question-text">タスクのContextを設定してください:</p>
<form hx-post="/clarification/classify_task" hx-target="#clarification-area" hx-swap="innerHTML">
    <input type="hidden" name="item_id" value="{{ current.id }}">

    <div class="form-group">
        <label class="form-label required">実施場所（複数選択可）</label>
        {% for val, name in locations %}
        <label class="checkbox-label">
            <input type="checkbox" name="locations" value="{{ val }}" {% if val == "desk" %}checked{% endif %}> {{ name }}
        </label>
        {% endfor %}
    </div>

    <div class="form-group">
        <label class="form-label required">所要時間</label>
        <select name="time_estimate" class="select-input">
            {% for val, name in time_estimates %}
            <option value="{{ val }}" {% if val == "30min" %}selected{% endif %}>{{ name }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="form-group">
        <label class="form-label required">必要なエネルギー</label>
        {% for val, name in energy_levels %}
        <label class="radio-label">
            <input type="radio" name="energy" value="{{ val }}" {% if val == "medium" %}checked{% endif %}> {{ name }}
        </label>
        {% endfor %}
    </div>

    <button type="submit" class="btn-primary">タスクとして登録</button>
</form>
{% else %}
<p class="question-text">{{ question }}</p>
<div class="btn-row">
    <form hx-post="/clarification/answer" hx-target="#clarification-area" hx-swap="innerHTML" style="display:inline">
        <input type="hidden" name="item_id" value="{{ current.id }}">
        <input type="hidden" name="step" value="{{ step }}">
        <input type="hidden" name="choice" value="yes">
        <button type="submit" class="btn-primary">はい</button>
    </form>
    <form hx-post="/clarification/answer" hx-target="#clarification-area" hx-swap="innerHTML" style="display:inline">
        <input type="hidden" name="item_id" value="{{ current.id }}">
        <input type="hidden" name="step" value="{{ step }}">
        <input type="hidden" name="choice" value="no">
        <button type="submit" class="btn-secondary">いいえ</button>
    </form>
</div>
{% endif %}
{% else %}
<p class="empty-msg">分類するアイテムはありません</p>
{% endif %}
