{% if current %}
<p class="muted-text">{{ remaining }}{{ labels.clarification.remaining_suffix }}</p>
<div class="clarification-card">
    <div class="clarification-title">{{ current.title }}</div>
    <div class="clarification-buttons">
        <button hx-post="/clarification/{{ current.id }}/classify/delegation" hx-target="#clarification-area" hx-swap="innerHTML"
                class="classify-btn classify-delegation">
            <span class="classify-icon">&#128100;</span>
            <span class="classify-label">{{ labels.execution.tags.delegation }}</span>
            <span class="classify-desc">{{ labels.clarification.delegation_desc }}</span>
        </button>
        <button hx-post="/clarification/{{ current.id }}/classify/project" hx-target="#clarification-area" hx-swap="innerHTML"
                class="classify-btn classify-project">
            <span class="classify-icon">&#128203;</span>
            <span class="classify-label">{{ labels.execution.tags.project }}</span>
            <span class="classify-desc">{{ labels.clarification.project_desc }}</span>
        </button>
        <button hx-post="/clarification/{{ current.id }}/classify/do_now" hx-target="#clarification-area" hx-swap="innerHTML"
                class="classify-btn classify-do-now">
            <span class="classify-icon">&#9889;</span>
            <span class="classify-label">{{ labels.execution.tags.do_now }}</span>
            <span class="classify-desc">{{ labels.clarification.do_now_desc }}</span>
        </button>
        <button hx-post="/clarification/{{ current.id }}/classify/task" hx-target="#clarification-area" hx-swap="innerHTML"
                class="classify-btn classify-task">
            <span class="classify-icon">&#9989;</span>
            <span class="classify-label">{{ labels.execution.tags.task }}</span>
            <span class="classify-desc">{{ labels.clarification.task_desc }}</span>
        </button>
    </div>
    <div class="clarification-secondary">
        <button hx-post="/clarification/{{ current.id }}/skip" hx-target="#clarification-area" hx-swap="innerHTML"
                class="btn-sm btn-secondary">
            &#9197; {{ labels.clarification.skip_button }}
        </button>
        <button hx-post="/clarification/{{ current.id }}/trash" hx-target="#clarification-area" hx-swap="innerHTML"
                class="btn-sm btn-danger">
            &#128465; {{ labels.clarification.trash_button }}
        </button>
    </div>
</div>
{% else %}
<div class="flow-message">
    <span class="flow-message-text">{{ labels.clarification.done_message }}</span>
    <a href="/execution" class="flow-message-link">{{ labels.clarification.done_link }}</a>
</div>
{% endif %}
