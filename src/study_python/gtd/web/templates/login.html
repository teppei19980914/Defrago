<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindFlow - ログイン</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1 class="login-title">MindFlow</h1>
            <p class="login-subtitle">GTD タスク管理</p>
            {% if error %}
            <div class="error-msg">{{ error }}</div>
            {% endif %}
            <form method="POST" action="/login">
                <div class="form-group">
                    <input type="text" name="username" placeholder="ユーザー名" class="text-input" required autofocus>
                </div>
                <div class="form-group">
                    <input type="password" name="password" placeholder="パスワード" class="text-input" required>
                </div>
                <button type="submit" class="btn-primary btn-full">ログイン</button>
            </form>
        </div>
    </div>
</body>
</html>
