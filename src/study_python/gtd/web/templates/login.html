<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ labels.app.name }} - {{ labels.auth.login }}</title>
    <link rel="stylesheet" href="/static/css/style.css?v=20260408">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1 class="login-title">{{ labels.app.name }}</h1>
            <p class="login-subtitle">{{ labels.app.subtitle }}</p>
            {% if error %}
            <div class="error-msg">{{ error }}</div>
            {% endif %}
            <form method="POST" action="/login">
                <div class="form-group">
                    <input type="text" name="username" placeholder="{{ labels.auth.username_placeholder }}" class="text-input" required autofocus>
                </div>
                <div class="form-group">
                    <input type="password" name="password" placeholder="{{ labels.auth.password_placeholder }}" class="text-input" required>
                </div>
                <button type="submit" class="btn-primary btn-full">{{ labels.auth.login }}</button>
            </form>
            {% if labels.auth.register_disabled %}
            <p class="login-register-link register-link-disabled">{{ labels.auth.login_to_register }} <span>{{ labels.auth.register }}</span></p>
            {% else %}
            <p class="login-register-link">{{ labels.auth.login_to_register }} <a href="/register">{{ labels.auth.register }}</a></p>
            {% endif %}
        </div>
    </div>
</body>
</html>
